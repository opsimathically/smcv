name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # pinned 2026-07-22
        with:
          toolchain: 1.94.0
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@c44f6b046f1c29ae5918b1e0bfdbb2f1813836fd # v2.84.1
        with:
          tool: cargo-audit@0.22.2,cargo-cyclonedx@0.5.9,cargo-deny@0.20.2
          fallback: none
      - name: Verify workspace
        run: ./scripts/check.sh
      - name: Verify operational workflows and release envelope
        run: |
          ./scripts/operations-smoke.sh
          ./scripts/release-verifier-smoke.sh
          ./scripts/build-release.sh
          ./scripts/verify-release.sh dist/smcv-0.1.0-x86_64-unknown-linux-gnu.tar.gz
