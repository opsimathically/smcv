          "minimum": 0,
          "type": "integer"
        }
      },
      "AuditLimit": {
        "in": "header",
        "name": "X-SMCV-Page-Size",
        "schema": {
          "default": 100,
          "maximum": 1000,
          "minimum": 1,
          "type": "integer"
        }
      },
      "CredentialAfter": {
        "in": "query",
        "name": "after",
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "CredentialId": {
        "in": "path",
        "name": "credential_id",
        "required": true,
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "Id": {
        "in": "path",
        "name": "id",
        "required": true,
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "IdempotencyKey": {
        "in": "header",
        "name": "Idempotency-Key",
        "required": true,
        "schema": {
          "maxLength": 128,
          "minLength": 1,
          "type": "string"
        }
      },
      "Limit": {
        "in": "query",
        "name": "limit",
        "schema": {
          "default": 50,
          "maximum": 100,
          "minimum": 1,
          "type": "integer"
        }
      },
      "NamespaceIdQuery": {
        "in": "query",
        "name": "namespace_id",
        "required": true,
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "ObjectAfter": {
        "in": "query",
        "name": "after",
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "ParentNamespaceId": {
        "in": "query",
        "name": "parent_namespace_id",
        "schema": {
          "format": "uuid",
          "type": "string"
        }
      },
      "Version": {
        "in": "path",
        "name": "version",
        "required": true,
        "schema": {
          "minimum": 1,
          "type": "integer"
        }
      }
    },
    "requestBodies": {
      "JsonObject": {
        "content": {
          "application/json": {
            "schema": {
              "type": "object"
            }
          }
        },
        "required": true
      },
      "Lifecycle": {
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/Lifecycle"
            }
          }
        },
        "required": true
      }
    },
    "responses": {
      "Error": {
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/Error"
            }
          }
        },
        "description": "Bounded non-enumerating error"
      },
      "Id": {
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/Id"
            }
          }
        },
        "description": "Created stable identifier"
      },
      "SecretValue": {
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/SecretValue"
            }
          }
        },
        "description": "Explicit secret-bearing response",
        "headers": {
          "Cache-Control": {
            "schema": {
              "const": "no-store",
              "type": "string"
            }
          }
        }
      },
      "Session": {
        "description": "Display-once CSRF token and secure session cookie"
      }
    },
    "schemas": {
      "BackupCreate": {
        "additionalProperties": false,
        "properties": {
          "key_mode": {
            "enum": [
              "generated_recovery",
              "passphrase"
            ],
            "type": "string"
          },
          "passphrase": {
            "maxLength": 1024,
            "minLength": 16,
            "type": "string",
            "writeOnly": true
          }
        },
        "required": [
          "key_mode"
        ],
        "type": "object"
      },
      "Error": {
        "additionalProperties": false,
        "example": {
          "code": "resource_unavailable",
          "message": "The requested resource is unavailable.",
          "request_id": "00000000-0000-4000-8000-000000000001"
        },
        "properties": {
          "code": {
            "type": "string"
          },
          "message": {
            "type": "string"
          },
          "request_id": {
            "format": "uuid",
            "type": "string"
          }
        },
        "required": [
          "code",
          "message",
          "request_id"
        ],
        "type": "object"
      },
      "Id": {
        "additionalProperties": false,
        "properties": {
          "id": {
            "format": "uuid",
            "type": "string"
          }
        },
        "required": [
          "id"
        ],
        "type": "object"
      },
      "Lifecycle": {
        "additionalProperties": false,
        "properties": {
          "expected_revision": {
            "minimum": 1,
            "type": "integer"
          }
        },
        "required": [
          "expected_revision"
        ],
        "type": "object"
      },
      "PasswordLogin": {
        "additionalProperties": false,
        "properties": {
          "password": {
            "maxLength": 1024,
            "minLength": 12,
            "type": "string",
            "writeOnly": true
          }
        },
        "required": [
          "password"
        ],
        "type": "object"
      },
      "SecretValue": {
        "additionalProperties": false,
        "example": {
          "value_base64": "c3ludGhldGlj"
        },
        "properties": {
          "value_base64": {
            "contentEncoding": "base64",
            "readOnly": true,
            "type": "string"
          }
        },
        "required": [
          "value_base64"
        ],
        "type": "object"
      }
    },
    "securitySchemes": {
      "bearerAuth": {
        "bearerFormat": "SMCV application credential",
        "scheme": "bearer",
        "type": "http"
      },
      "sessionCookie": {
        "in": "cookie",
        "name": "__Host-smcv_session",
        "type": "apiKey"
      }
    }
  },
  "info": {
    "description": "Same-origin, non-enumerating API for one encrypted SMCV vault. Secret-bearing responses are never cacheable.",
    "title": "SMCV API",
    "version": "1.0.0"
  },
  "openapi": "3.1.0",
  "paths": {
    "/audit-events": {
      "get": {
        "operationId": "auditEvents",
        "parameters": [
          {
            "$ref": "#/components/parameters/AuditAfter"
          },
          {
            "$ref": "#/components/parameters/AuditLimit"
          }
        ],
        "responses": {
          "200": {
            "description": "Authenticated audit records"
          },
          "default": {
            "$ref": "#/components/responses/Error"
          }
        },
        "summary": "Read bounded audit page"
      }
    },
    "/backup-verifications": {
      "post": {
        "operationId": "verifyUploadedBackup",
        "requestBody": {
          "content": {
            "multipart/form-data": {
              "schema": {
                "properties": {
                  "archive": {
                    "format": "binary",
                    "type": "string"
                  },
                  "key": {
                    "format": "password",
                    "type": "string",
                    "writeOnly": true
                  },
                  "key_mode": {
                    "enum": [
                      "generated_recovery",
                      "recovery_key",
                      "passphrase"
                    ],
                    "type": "string"
                  }
                },
                "required": [
                  "key_mode",
                  "key",
                  "archive"
                ],
                "type": "object"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "Authenticated metadata and successful clean restore drill"
          },
          "default": {
            "$ref": "#/components/responses/Error"
          }
        },
        "summary": "Fully verify and clean-restore-test an uploaded portable archive"
      }
    },
    "/backups": {
      "get": {
        "operationId": "listBackupJobs",
