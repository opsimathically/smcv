          "200": {
            "description": "Unexpired backup jobs without recovery material"
          },
          "default": {
            "$ref": "#/components/responses/Error"
          }
        },
        "summary": "List safe durable backup job status"
      },
      "post": {
        "operationId": "createBackupJob",
