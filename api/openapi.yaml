                "$ref": "#/components/schemas/BackupCreate"
              }
            }
          },
          "required": true
        },
        "responses": {
          "202": {
            "description": "Opaque job and optional display-once recovery key"
          },
          "default": {
            "$ref": "#/components/responses/Error"
          }
        },
        "summary": "Start a durable portable-backup job"
      }
    },
    "/backups/{id}": {
      "delete": {
        "operationId": "deleteBackupArtifact",
